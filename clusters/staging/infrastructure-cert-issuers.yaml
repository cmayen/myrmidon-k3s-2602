apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-cert-issuers
  namespace: flux-system
spec:
  interval: 10m
  prune: true

  dependsOn:
    - name: infrastructure-controllers

  sourceRef:
    kind: GitRepository
    name: flux-system

  path: ./infrastructure/controllers/staging/cert-issuers

  wait: true

  timeout: 5m
