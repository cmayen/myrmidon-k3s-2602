apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt
spec:
  acme:
    # Replace with your real email
    email: cmayen@gmail.com

    # Production Let's Encrypt ACME endpoint
    server: https://acme-v02.api.letsencrypt.org/directory

    # Secret used to store the ACME account private key
    privateKeySecretRef:
      name: letsencrypt

    solvers:
      - http01:
          ingress:
            class: traefik
